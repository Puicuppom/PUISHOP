<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grocery Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        .loading-overlay { background: rgba(255,255,255,0.8); z-index: 9999; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <!-- Loading Spinner -->
    <div id="loader" class="fixed inset-0 loading-overlay flex items-center justify-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <!-- Login Page -->
    <div id="page-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-3xl font-bold mb-6 text-center text-blue-600">เข้าสู่ระบบ</h2>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="อีเมล" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                <input type="password" id="login-pass" placeholder="รหัสผ่าน" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">เข้าสู่ระบบ</button>
            </div>
            <p class="mt-4 text-center text-sm text-gray-500 italic">Admin: admin@test.com | 1234</p>
        </div>
    </div>

    <!-- Main Content (Hidden by default) -->
    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b sticky top-0 z-40">
            <div class="container mx-auto p-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img id="store-logo" src="" class="w-10 h-10 rounded-lg object-cover bg-gray-100">
                    <span id="store-name" class="font-bold text-xl">Grocery Store</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-display" class="hidden md:block text-sm font-medium text-gray-600"></span>
                    <button onclick="logout()" class="text-red-500 font-bold text-sm">ออกจากระบบ</button>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 flex-1">
            <!-- BUYER VIEW -->
            <div id="view-buyer" class="hidden space-y-6">
                <div class="grid lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-blue-600 text-white p-6 rounded-2xl shadow-lg">
                            <h2 class="text-xl font-bold mb-2 italic">แสกนรายการสั่งของ 📝</h2>
                            <p class="text-blue-100 text-sm mb-4">ถ่ายรูปใบสั่งของที่เขียนด้วยมือ ระบบจะเลือกสินค้าให้เอง!</p>
                            <input type="file" id="scan-input" accept="image/*" class="block w-full text-sm text-blue-100 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-blue-800 file:text-white hover:file:bg-blue-900 cursor-pointer">
                            <button onclick="processOCR()" class="mt-4 w-full bg-white text-blue-600 py-3 rounded-xl font-bold shadow-md hover:bg-blue-50 transition">แสกนลายมือ</button>
                        </div>
                        <div id="ocr-results" class="grid gap-3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border h-fit sticky top-24">
                        <h3 class="font-bold text-lg mb-4">ตะกร้าสินค้า 🛒</h3>
                        <div id="cart-list" class="divide-y mb-4"></div>
                        <div class="flex justify-between text-2xl font-black mb-6">
                            <span>รวม:</span>
                            <span class="text-blue-600"><span id="cart-total">0</span> ฿</span>
                        </div>
                        <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg">ชำระเงิน (QR Code)</button>
                        <div id="qr-area" class="mt-4 hidden text-center">
                            <img id="qr-code" src="" class="mx-auto border p-2 bg-white rounded-lg">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ADMIN VIEW -->
            <div id="view-admin" class="hidden max-w-4xl mx-auto space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="font-bold text-blue-600 mb-4 border-b pb-2">📦 คลังสินค้า</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="p-name" placeholder="ชื่อสินค้า" class="flex-1 p-2 border rounded-lg">
                            <input type="number" id="p-price" placeholder="ราคา" class="w-20 p-2 border rounded-lg">
                            <button onclick="addProduct()" class="bg-blue-600 text-white px-4 rounded-lg">+</button>
                        </div>
                        <div id="stock-list" class="divide-y max-h-96 overflow-auto text-sm"></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="font-bold text-blue-600 mb-4 border-b pb-2">⚙️ ตั้งค่าร้าน</h3>
                        <div class="space-y-3">
                            <input type="text" id="s-name" placeholder="ชื่อร้าน" class="w-full p-2 border rounded-lg text-sm">
                            <input type="text" id="s-logo" placeholder="URL โลโก้" class="w-full p-2 border rounded-lg text-sm">
                            <input type="text" id="s-pp" placeholder="เบอร์ PromptPay" class="w-full p-2 border rounded-lg text-sm">
                            <button onclick="saveSettings()" class="w-full bg-black text-white py-2 rounded-lg font-bold">บันทึกข้อมูลร้าน</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5JhO5CDS7ajKZtjG2uZFku6z_DfCYS40qb8nvsag8KdBbmc_uUzk9RBAN6izWjVm9Ww/exec";
        
        let products = [];
        let cart = [];
        let settings = {};
        let currentUser = JSON.parse(localStorage.getItem('user'));

        // --- AUTH LOGIC ---
        async function handleLogin() {
            showLoader(true);
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', email, password })
            });
            const result = await res.json();
            
            if (result.success) {
                localStorage.setItem('user', JSON.stringify(result));
                currentUser = result;
                initApp();
            } else {
                alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
            }
            showLoader(false);
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }

        // --- DATA LOGIC ---
        async function initApp() {
            if (!currentUser) return;
            
            document.getElementById('page-login').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = `สวัสดี, ${currentUser.email}`;
            
            showLoader(true);
            const res = await fetch(`${SCRIPT_URL}?action=getInitialData`);
            const data = await res.json();
            
            products = data.products.map(p => ({ id: p[0], name: p[1], price: p[2] }));
            settings = { name: data.settings[0], logo: data.settings[1], pp: data.settings[2] };

            document.getElementById('store-name').innerText = settings.name;
            document.getElementById('store-logo').src = settings.logo || "https://via.placeholder.com/50";
            
            if (currentUser.role === 'admin') {
                document.getElementById('view-admin').classList.remove('hidden');
                renderStock();
                // Pre-fill settings
                document.getElementById('s-name').value = settings.name;
                document.getElementById('s-logo').value = settings.logo;
                document.getElementById('s-pp').value = settings.pp;
            } else {
                document.getElementById('view-buyer').classList.remove('hidden');
            }
            showLoader(false);
        }

        // --- BUYER ACTIONS ---
        async function processOCR() {
            const file = document.getElementById('scan-input').files[0];
            if (!file) return alert('กรุณาเลือกรูปภาพ');
            
            showLoader(true);
            const result = await Tesseract.recognize(file, 'tha+eng');
            const lines = result.data.text.split('\n');
            const resDiv = document.getElementById('ocr-results');
            resDiv.innerHTML = '';

            lines.forEach(line => {
                if (line.trim().length < 2) return;
                const match = products.find(p => line.includes(p.name));
                const itemDiv = document.createElement('div');
                itemDiv.className = "flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm";
                
                if (match) {
                    itemDiv.innerHTML = `<span>✅ ${match.name} - ${match.price}฿</span> <button onclick="addToCart('${match.id}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg">+</button>`;
                } else {
                    let options = products.map(p => `<option value="${p.id}">${p.name} (${p.price}฿)</option>`).join('');
                    itemDiv.innerHTML = `<span class="text-gray-400 italic">❓ "${line.substring(0,10)}..."</span> 
                        <select onchange="addToCart(this.value)" class="text-xs border p-1 rounded-lg">
                            <option>เลือกสินค้าเอง</option>${options}
                        </select>`;
                }
                resDiv.appendChild(itemDiv);
            });
            showLoader(false);
        }

        function addToCart(id) {
            const p = products.find(i => i.id == id);
            if(p) { cart.push({...p, uid: Date.now()}); renderCart(); }
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map(item => {
                total += parseFloat(item.price);
                return `<div class="flex justify-between py-2 text-sm"><span>${item.name}</span><b>${item.price}฿</b></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function checkout() {
            const total = document.getElementById('cart-total').innerText.replace(',','');
            if(total == "0") return;
            document.getElementById('qr-code').src = `https://promptpay.io/${settings.pp}/${total}.png`;
            document.getElementById('qr-area').classList.remove('hidden');
        }

        // --- ADMIN ACTIONS ---
        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            showLoader(true);
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addProduct', name, price }) });
            location.reload();
        }

        async function saveSettings() {
            const name = document.getElementById('s-name').value;
            const logo = document.getElementById('s-logo').value;
            const pp = document.getElementById('s-pp').value;
            showLoader(true);
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateSettings', name, logo, pp }) });
            location.reload();
        }

        function renderStock() {
            document.getElementById('stock-list').innerHTML = products.map(p => `
                <div class="flex justify-between py-2 items-center">
                    <span>${p.name} (${p.price}฿)</span>
                    <button onclick="deleteProduct('${p.id}')" class="text-red-500">ลบ</button>
                </div>`).join('');
        }

        async function deleteProduct(id) {
            if(!confirm('ลบสินค้านี้?')) return;
            showLoader(true);
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteProduct', id }) });
            location.reload();
        }

        function showLoader(v) { document.getElementById('loader').classList.toggle('hidden', !v); }

        // Start App
        if (currentUser) initApp();
    </script>
</body>
</html>
