<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUI SHOP V5.2 - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; padding-bottom: 100px; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; overflow: hidden; }
        .tab-active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #eff6ff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-grad { background-image: linear-gradient(to right, #2563eb 0%, #4f46e5 51%, #2563eb 100%); transition: 0.5s; background-size: 200% auto; }
        .btn-grad:hover { background-position: right center; }
        .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 10px; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-weight: bold; }
        
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            @page { size: A5 portrait; margin: 10mm; }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center hidden font-bold text-blue-600">
        <div class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4 shadow-xl"></div>
        <p class="tracking-widest animate-pulse">กำลังจัดการข้อมูล...</p>
    </div>

    <!-- 1. AUTH PAGE -->
    <div id="page-auth" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border border-slate-100">
            <div id="login-form">
                <h2 class="text-5xl font-black mb-10 text-center bg-gradient-to-br from-blue-600 to-indigo-700 bg-clip-text text-transparent italic tracking-tighter">PUI SHOP</h2>
                <div class="space-y-4">
                    <input type="email" id="l-email" placeholder="อีเมล" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="password" id="l-pass" placeholder="รหัสผ่าน" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="handleLogin()" class="w-full btn-grad text-white py-5 rounded-[2rem] font-bold shadow-xl">เข้าสู่ระบบ</button>
                    <button onclick="toggleAuth(false)" class="w-full mt-6 text-slate-400 text-sm">ยังไม่มีบัญชี? สมัครใหม่</button>
                </div>
            </div>
            <div id="register-form" class="hidden space-y-4">
                <h2 class="text-2xl font-bold text-center mb-6">สมัครสมาชิก</h2>
                <input type="email" id="r-email" placeholder="อีเมล" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border">
                <input type="password" id="r-pass" placeholder="รหัสผ่าน" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border">
                <input type="text" id="r-name" placeholder="ชื่อ-นามสกุล" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border">
                <textarea id="r-addr" placeholder="ที่อยู่จัดส่ง" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border h-24"></textarea>
                <input type="text" id="r-phone" placeholder="เบอร์โทร" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border">
                <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-4 rounded-[2rem] font-bold">สมัครสมาชิก</button>
                <button onclick="toggleAuth(true)" class="w-full mt-4 text-slate-400 text-center block text-sm">กลับไปล็อกอิน</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP CONTENT -->
    <div id="main-app" class="hidden min-h-screen flex flex-col no-print">
        <header class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-50 flex justify-between items-center border-b">
            <div class="flex items-center gap-3">
                <img id="st-logo" src="" class="w-10 h-10 rounded-xl object-cover bg-slate-50 border">
                <span id="st-name" class="font-bold text-lg text-slate-700 italic uppercase">PUI SHOP</span>
            </div>
            <div class="flex items-center gap-3">
                <div id="sync-indicator" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <button onclick="logout()" class="text-red-500 bg-red-50 px-4 py-2 rounded-xl text-xs font-bold">LOGOUT</button>
            </div>
        </header>

        <main class="container mx-auto p-4 flex-1">
            <!-- VIEW: MANUAL SETUP (ADMIN ONLY) -->
            <div id="view-manual-setup" class="hidden min-h-[60vh] flex items-center justify-center">
                <div class="card p-10 w-full max-w-md border-2 border-blue-500 shadow-2xl">
                    <div class="text-center mb-8"><span class="text-5xl mb-4 block">✍️</span><h2 class="text-2xl font-black text-blue-600">ลงออเดอร์แทนลูกค้า</h2></div>
                    <input type="text" id="m-cust-input" placeholder="ระบุชื่อลูกค้า / เบอร์โทร" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none text-lg font-bold text-center mb-4">
                    <button onclick="startManualOrder()" class="w-full btn-grad text-white py-5 rounded-[2rem] font-bold text-xl shadow-lg">เลือกสินค้าลงตะกร้า</button>
                </div>
            </div>

            <!-- VIEW: SHOP / BUY -->
            <div id="view-buy" class="hidden space-y-6 max-w-6xl mx-auto">
                <div id="manual-mode-banner" class="hidden bg-orange-500 text-white p-4 rounded-3xl font-bold shadow-xl flex justify-between items-center">
                    <span>👤 กำลังสั่งแทน: <span id="manual-cust-display" class="underline"></span></span>
                    <button onclick="clearManualMode()" class="bg-white/20 px-4 py-2 rounded-2xl text-xs font-black uppercase">ยกเลิก</button>
                </div>
                <div class="grid lg:grid-cols-2 gap-8">
                    <div class="card p-6">
                        <input type="text" id="buy-search" oninput="renderBuyerProducts()" placeholder="🔍 ค้นหาสินค้า..." class="w-full p-4 bg-slate-50 rounded-2xl border mb-6">
                        <div id="buyer-product-grid" class="space-y-3 max-h-[600px] overflow-y-auto no-scrollbar"></div>
                    </div>
                    <div class="card p-8 border-t-8 border-t-blue-600 h-fit sticky top-24">
                        <h3 class="font-black text-2xl mb-6">ตะกร้าสินค้า</h3>
                        <div id="cart-list" class="divide-y mb-8"></div>
                        
                        <div id="pay-select-area" class="grid grid-cols-2 gap-2 mb-6">
                            <label class="border p-3 rounded-2xl text-center cursor-pointer has-[:checked]:bg-blue-600 has-[:checked]:text-white transition-all">
                                <input type="radio" name="payMethod" value="โอนเงิน" class="hidden" checked onchange="toggleSlipUI(true)"> <span class="text-xs font-bold">โอนเงิน</span>
                            </label>
                            <label class="border p-3 rounded-2xl text-center cursor-pointer has-[:checked]:bg-blue-600 has-[:checked]:text-white transition-all">
                                <input type="radio" name="payMethod" value="เงินสด" class="hidden" onchange="toggleSlipUI(false)"> <span class="text-xs font-bold">จ่ายสด</span>
                            </label>
                        </div>

                        <div id="slip-ui" class="bg-slate-50 p-4 rounded-2xl mb-6 text-center">
                            <img id="qr-img" class="mx-auto rounded-xl w-32 mb-3">
                            <input type="file" id="slip-input" accept="image/*" class="text-[10px]">
                        </div>

                        <div class="text-4xl font-black flex justify-between mb-8">
                            <span class="text-sm self-center text-slate-400 uppercase">Total</span>
                            <span><span id="cart-total">0</span> ฿</span>
                        </div>
                        <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-6 rounded-[2.5rem] font-black text-2xl shadow-xl active:scale-95 transition-all">ยืนยันออเดอร์</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: STATUS (USER ONLY) -->
            <div id="view-orders" class="hidden space-y-4 max-w-lg mx-auto pb-24">
                <h3 class="font-black text-3xl px-2 italic text-blue-600">📦 ติดตามออเดอร์</h3>
                <div id="user-orders-list" class="space-y-4"></div>
            </div>

            <!-- VIEW: ADMIN DASHBOARD -->
            <div id="view-admin" class="hidden space-y-6 pb-24">
                <div class="flex bg-white rounded-3xl shadow-sm border p-2">
                    <button onclick="switchAdminTab('orders')" id="btn-tab-orders" class="flex-1 py-4 text-xs font-bold rounded-2xl tab-active relative">📋 ออเดอร์ <span id="badge-ord" class="badge hidden"></span></button>
                    <button onclick="switchAdminTab('inventory')" id="btn-tab-inventory" class="flex-1 py-4 text-xs font-bold rounded-2xl text-slate-400 relative">📊 สต็อก <span id="badge-inv" class="badge hidden">!</span></button>
                    <button onclick="switchAdminTab('settings')" id="btn-tab-settings" class="flex-1 py-4 text-xs font-bold rounded-2xl text-slate-400 relative">⚙️ ตั้งค่า <span id="badge-usr" class="badge hidden"></span></button>
                </div>

                <div id="admin-orders-section" class="space-y-4">
                    <div id="admin-orders-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <div id="admin-inventory-section" class="hidden space-y-4">
                    <div class="card p-4 flex gap-3"><input type="text" id="inv-search" oninput="renderInventory()" placeholder="ค้นหาสินค้า..." class="flex-1 p-4 bg-slate-50 rounded-2xl border outline-none"><button onclick="openProductModal()" class="bg-blue-600 text-white px-8 rounded-2xl font-black text-2xl">+</button></div>
                    <div class="card overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-slate-50 border-b font-black text-slate-400 text-[10px] uppercase"><tr><th class="p-6">สินค้า</th><th class="p-6">ราคา</th><th class="p-6">คลัง</th><th class="p-6 text-center">จัดการ</th></tr></thead><tbody id="inventory-list" class="divide-y divide-slate-100"></tbody></table></div>
                </div>

                <div id="admin-settings-section" class="hidden space-y-6 max-w-lg mx-auto">
                    <div class="card p-8 space-y-5 text-center">
                        <img id="s-logo-preview" class="w-24 h-24 mx-auto rounded-3xl object-cover border-4 border-white shadow-xl mb-4">
                        <input type="text" id="s-name" placeholder="ชื่อร้าน" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                        <input type="text" id="s-pp" placeholder="PromptPay เบอร์โทร/เลขบัตร" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                        <input type="file" id="s-logo-input" accept="image/*" class="text-xs block mx-auto">
                        <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-bold shadow-lg">บันทึกตั้งค่า</button>
                    </div>
                    <div id="admin-pending-users" class="space-y-3"></div>
                </div>
            </div>
        </main>

        <!-- Navbar -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t flex justify-around p-5 z-40 no-print">
            <button onclick="switchView(user.role==='admin'?'manual-setup':'buy')" id="nav-buy" class="flex flex-col items-center gap-1 text-blue-600 font-bold">
                <span class="text-3xl">🛒</span><span class="text-[10px] uppercase" id="nav-label-buy">Shop</span>
            </button>
            <button onclick="switchView('orders')" id="nav-orders" class="flex flex-col items-center gap-1 text-slate-400 font-bold">
                <span class="text-3xl">📦</span><span class="text-[10px] uppercase">Status</span>
            </button>
            <button onclick="switchView('admin')" id="nav-admin-btn" class="hidden flex flex-col items-center gap-1 text-slate-400 font-bold">
                <span class="text-3xl">⚙️</span><span class="text-[10px] uppercase">Admin</span>
            </button>
        </nav>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[200] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 space-y-4">
            <h3 class="font-black text-2xl text-center">จัดการสต็อก</h3>
            <input type="hidden" id="edit-id"><input type="text" id="edit-name" placeholder="ชื่อสินค้า" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
            <div class="flex gap-3"><input type="number" id="edit-price" placeholder="ราคา" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold"><input type="number" id="edit-stock" placeholder="คลัง" class="w-24 p-4 bg-slate-50 rounded-2xl font-bold text-center"></div>
            <input type="file" id="edit-image" accept="image/*" class="text-xs w-full p-4 bg-slate-50 rounded-2xl border-2 border-dashed">
            <div class="flex gap-3 pt-4"><button onclick="closeProductModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold text-slate-400">ยกเลิก</button><button onclick="saveProduct()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold">บันทึก</button></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDDVj3WpoijA4P0H9gVzCj2n9eBRJDi7sV1mWCeru4SJtdm5giL9S6QF6SIhKmYuh5JQ/exec";
        let products = [], cart = [], settings = {}, user = JSON.parse(localStorage.getItem('puis_v5_final'));
        let allOrders = [], manualMode = null, currentAdminFilter = 'รอตรวจสอบ';

        async function handleLogin() {
            const email = document.getElementById('l-email').value, pass = document.getElementById('l-pass').value;
            showLoader(true);
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action:'login', email, password:pass }) });
                const data = await res.json();
                if(data.success) { localStorage.setItem('puis_v5_final', JSON.stringify(data)); user = data; init(); }
                else alert(data.message);
            } catch(e) { alert("Login failed"); }
            showLoader(false);
        }

        async function handleRegister() {
            const data = { action:'register', email:document.getElementById('r-email').value, password:document.getElementById('r-pass').value, name:document.getElementById('r-name').value, address:document.getElementById('r-addr').value, phone:document.getElementById('r-phone').value };
            showLoader(true); await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(data) });
            alert("สมัครแล้ว รออนุมัติ"); location.reload();
        }

        function logout() { localStorage.removeItem('puis_v5_final'); location.reload(); }
        function toggleAuth(v) { document.getElementById('login-form').classList.toggle('hidden', !v); document.getElementById('register-form').classList.toggle('hidden', v); }

        async function syncData(useLoader = false) {
            if(useLoader) showLoader(true);
            const indicator = document.getElementById('sync-indicator');
            indicator.classList.replace('bg-green-500', 'bg-orange-500');
            try {
                const [resInit, resOrders] = await Promise.all([
                    fetch(SCRIPT_URL + "?action=getInitialData"), fetch(SCRIPT_URL + "?action=getOrders")
                ]);
                const data = await resInit.json();
                products = data.products.map(p => ({id:p[0], name:p[1], price:p[2], image:p[3], stock:p[4] || 0}));
                settings = data.settings;
                allOrders = await resOrders.json();
                
                document.getElementById('st-name').innerText = settings.name;
                document.getElementById('st-logo').src = settings.logo || "";
                updateBadges();
                renderBuyerProducts();
                renderInventory();
                if(user.role === 'admin') filterAdminOrders(currentAdminFilter);
                else renderUserOrders();
                
                indicator.classList.replace('bg-orange-500', 'bg-green-500');
            } catch(e) { console.error("Sync error"); }
            if(useLoader) showLoader(false);
        }

        function updateBadges() {
            if(user.role !== 'admin') return;
            const pendingOrd = allOrders.filter(o => o[7] === 'รอตรวจสอบ').length;
            const badgeOrd = document.getElementById('badge-ord');
            badgeOrd.innerText = pendingOrd; badgeOrd.classList.toggle('hidden', pendingOrd === 0);
            const lowStock = products.filter(p => p.stock <= 3).length;
            document.getElementById('badge-inv').classList.toggle('hidden', lowStock === 0);
        }

        async function init() {
            if(!user) return;
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            if(user.role === 'admin') {
                document.getElementById('nav-admin-btn').classList.remove('hidden');
                document.getElementById('nav-orders').classList.add('hidden'); // Admin ไม่ต้องดู Status ตนเอง
                document.getElementById('nav-label-buy').innerText = "สั่งแทน";
                switchView('admin');
            } else {
                switchView('buy');
            }
            await syncData(true);
            setInterval(() => syncData(false), 45000);
        }

        function switchView(v) {
            ['view-buy', 'view-orders', 'view-admin', 'view-manual-setup'].forEach(id => document.getElementById(id).classList.add('hidden'));
            if(v==='manual-setup' && user.role==='admin' && manualMode) v='buy';
            document.getElementById('view-'+v).classList.remove('hidden');
            
            ['nav-buy', 'nav-orders', 'nav-admin-btn'].forEach(id => document.getElementById(id).classList.replace('text-blue-600', 'text-slate-400'));
            const activeNav = (v === 'admin') ? 'nav-admin-btn' : (v === 'orders' ? 'nav-orders' : 'nav-buy');
            document.getElementById(activeNav)?.classList.replace('text-slate-400', 'text-blue-600');
            syncData(false);
        }

        function switchAdminTab(t) {
            ['admin-orders-section', 'admin-inventory-section', 'admin-settings-section'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['btn-tab-orders', 'btn-tab-inventory', 'btn-tab-settings'].forEach(id => document.getElementById(id).classList.remove('tab-active', 'text-blue-600'));
            document.getElementById('admin-'+t+'-section').classList.remove('hidden');
            document.getElementById('btn-tab-'+t).classList.add('tab-active', 'text-blue-600');
            if(t === 'settings') {
                document.getElementById('s-name').value = settings.name;
                document.getElementById('s-pp').value = settings.pp;
                document.getElementById('s-logo-preview').src = settings.logo || "";
                loadPendingUsers();
            }
        }

        // --- SHOPPING ---
        function renderBuyerProducts() {
            const grid = document.getElementById('buyer-product-grid'), search = document.getElementById('buy-search').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            grid.innerHTML = filtered.map(p => `
                <div class="flex items-center gap-4 p-4 bg-white rounded-3xl border shadow-sm ${p.stock <=0 ? 'opacity-40':''}">
                    <img src="${p.image}" class="w-14 h-14 rounded-xl object-cover border">
                    <div class="flex-1"><p class="font-bold text-sm">${p.name}</p><p class="text-xs text-blue-600 font-bold">${p.price} ฿ | คลัง: ${p.stock}</p></div>
                    <button onclick="addToCart('${p.id}')" ${p.stock<=0?'disabled':''} class="w-10 h-10 bg-blue-600 text-white rounded-xl font-bold">+</button>
                </div>`).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if(!p || p.stock <= 0) return;
            const ex = cart.find(x => x.id === id);
            if(ex) { if(ex.qty < p.stock) ex.qty++; }
            else cart.push({...p, qty: 1});
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list'); let total = 0;
            list.innerHTML = cart.map(i => {
                total += (i.price * i.qty);
                return `<div class="flex justify-between py-3 items-center"><p class="font-bold text-xs">${i.name} x ${i.qty}</p><div class="flex gap-2"><button onclick="updateCartQty('${i.id}',-1)" class="w-8 h-8 border rounded-full font-bold">-</button><span class="font-bold w-4 text-center text-xs">${i.qty}</span><button onclick="updateCartQty('${i.id}',1)" class="w-8 h-8 border rounded-full font-bold">+</button></div></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString();
            updateQR();
        }

        function updateCartQty(id, d) {
            const i = cart.find(x => x.id === id), p = products.find(x => x.id === id);
            i.qty += d;
            if(i.qty > p.stock) i.qty = p.stock;
            if(i.qty <= 0) cart = cart.filter(x => x.id !== id);
            renderCart();
        }

        function updateQR() {
            const total = document.getElementById('cart-total').innerText.replace(/,/g, '');
            if(total != "0" && settings.pp) document.getElementById('qr-img').src = `https://promptpay.io/${settings.pp}/${total}.png`;
        }

        function toggleSlipUI(v) { document.getElementById('slip-ui').classList.toggle('hidden', !v); }

        async function submitOrder() {
            if(!cart.length) return alert("ตะกร้าว่าง");
            const method = document.querySelector('input[name="payMethod"]:checked').value, file = document.getElementById('slip-input').files[0];
            if(method === 'โอนเงิน' && !file && !manualMode) return alert("แนบสลิปด้วยครับ");
            
            showLoader(true);
            const data = { action:'createOrder', email: manualMode?manualMode.email:user.email, customerInfo: manualMode?manualMode.name:`${user.name} | ${user.phone}`, paymentMethod: method, items: cart, total: document.getElementById('cart-total').innerText };
            if(manualMode) { data.status = "กำลังจัดของ"; data.paymentStatus = "จ่ายแล้ว"; }

            const send = async (b64) => {
                data.slip = b64;
                await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(data) });
                alert("บันทึกออเดอร์แล้ว");
                cart = []; renderCart();
                if(manualMode) clearManualMode(); else switchView('orders');
                showLoader(false);
            };
            if(file) resizeImage(file, send); else send(null);
        }

        // --- ORDER VIEWS ---
        function renderUserOrders() {
            const list = document.getElementById('user-orders-list'), my = allOrders.filter(o => o[1] === user.email);
            list.innerHTML = my.reverse().map(o => `
            <div class="card p-6 border-l-8 ${o[7]==='รอตรวจสอบ'?'border-l-slate-300':o[7]==='กำลังจัดของ'?'border-l-orange-500':'border-l-green-600'}">
                <div class="flex justify-between text-[9px] text-slate-400 font-bold uppercase"><span>${o[8].split('T')[0]}</span><span>#${o[0].substring(4,10)}</span></div>
                <p class="font-bold text-slate-800 mt-1">${o[7]}</p>
                <div class="flex justify-between items-center mt-3"><span class="text-2xl font-black text-blue-600">${o[5]} ฿</span><span class="text-[9px] font-black uppercase ${o[10]==='จ่ายแล้ว'?'text-green-600':'text-red-500'}">${o[10]}</span></div>
            </div>`).join('');
        }

        function filterAdminOrders(s) {
            currentAdminFilter = s;
            const list = document.getElementById('admin-orders-list'), filtered = allOrders.filter(o => o[7] === s);
            list.innerHTML = filtered.reverse().map(o => `
            <div class="card p-5 border-t-8 ${s==='รอตรวจสอบ'?'border-t-slate-300':s==='กำลังจัดของ'?'border-t-orange-500':'border-t-blue-600'}">
                <div class="flex justify-between text-[9px] text-slate-400 font-bold uppercase mb-2"><span>${o[8].split('T')[0]}</span><span>${o[0].substring(4,10)}</span></div>
                <p class="font-bold text-slate-800 border-b pb-2 mb-2">${o[2]}</p>
                <div class="text-xs text-slate-500 mb-3">${JSON.parse(o[4]).map(i=>`• ${i.name} x ${i.qty}`).join('<br>')}</div>
                <div class="flex justify-between items-center mb-4"><button onclick="viewImage('${o[6]}')" class="text-xs text-blue-600 font-bold underline">ดูสลิป</button><span class="text-xl font-black">${o[5]} ฿</span></div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="printOrder('${o[0]}')" class="bg-slate-100 py-3 rounded-xl text-[10px] font-bold">พิมพ์ A5</button>
                    ${s==='รอตรวจสอบ'?`<button onclick="updateStatus('${o[0]}','กำลังจัดของ')" class="bg-orange-500 text-white py-3 rounded-xl text-[10px] font-bold">รับออเดอร์</button>`:''}
                    ${s==='กำลังจัดของ'?`<button onclick="updateStatus('${o[0]}','จัดของเสร็จ')" class="bg-green-600 text-white py-3 rounded-xl text-[10px] font-bold">จัดเสร็จ</button>`:''}
                    ${s==='จัดของเสร็จ'?`<button onclick="updateStatus('${o[0]}','จัดส่งสำเร็จ')" class="bg-blue-600 text-white py-3 rounded-xl text-[10px] font-bold">ส่งแล้ว</button>`:''}
                </div>
            </div>`).join('');
        }

        async function updateStatus(id, s) { showLoader(true); await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'updateOrderStatus',orderId:id,status:s})}); await syncData(false); showLoader(false); }
        async function markAsPaid(id) { if(confirm("รับเงินแล้ว?")) { showLoader(true); await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'updatePaymentStatus', orderId:id})}); await syncData(false); showLoader(false); } }

        function renderInventory() {
            const list = document.getElementById('inventory-list'), search = document.getElementById('inv-search').value.toLowerCase();
            list.innerHTML = products.filter(p=>p.name.toLowerCase().includes(search)).map(p => `
                <tr><td class="p-6 flex items-center gap-3"><img src="${p.image}" class="w-10 h-10 rounded-xl object-cover border"><span class="font-bold text-xs">${p.name}</span></td>
                <td class="p-6 font-bold text-blue-600">${p.price}</td><td class="p-6 text-xs font-bold">${p.stock}</td>
                <td class="p-6 text-center"><button onclick="openProductModal('${p.id}')" class="text-blue-500 text-[10px] font-black underline uppercase">Edit</button></td></tr>`).join('');
        }

        function openProductModal(id=null) {
            document.getElementById('product-modal').classList.remove('hidden');
            if(id) { const p=products.find(x=>x.id===id); document.getElementById('edit-id').value=p.id; document.getElementById('edit-name').value=p.name; document.getElementById('edit-price').value=p.price; document.getElementById('edit-stock').value=p.stock; }
            else { document.getElementById('edit-id').value=""; document.getElementById('edit-name').value=""; document.getElementById('edit-price').value=""; document.getElementById('edit-stock').value=0; }
        }
        function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }

        async function saveProduct() {
            const id=document.getElementById('edit-id').value, name=document.getElementById('edit-name').value, price=document.getElementById('edit-price').value, stock=document.getElementById('edit-stock').value, file=document.getElementById('edit-image').files[0];
            showLoader(true);
            const send = async (b64) => { await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:id?'updateProduct':'addProduct',id,name,price,stock,image:b64})}); await syncData(false); closeProductModal(); showLoader(false); };
            if(file) resizeImage(file, send); else send(null);
        }

        async function saveSettings() {
            const n = document.getElementById('s-name').value, p = document.getElementById('s-pp').value, f = document.getElementById('s-logo-input').files[0];
            showLoader(true);
            const send = async (b64) => {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateSettings', name: n, pp: p, logo: b64 || settings.logo }) });
                await syncData(true);
            };
            if (f) resizeImage(f, send); else send(null);
        }

        async function loadPendingUsers() {
            const res = await fetch(SCRIPT_URL+"?action=getPendingUsers"), users = await res.json();
            const badge = document.getElementById('badge-usr'); badge.innerText = users.length; badge.classList.toggle('hidden', users.length === 0);
            document.getElementById('admin-pending-users').innerHTML = users.map(u => `<div class="card p-4 flex justify-between items-center"><p class="text-xs font-bold">${u[2]}</p><button onclick="approveUser('${u[0]}')" class="bg-green-600 text-white text-[10px] px-4 py-2 rounded-xl">อนุมัติ</button></div>`).join('');
        }
        async function approveUser(e) { showLoader(true); await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'approveUser',email:e})}); await syncData(false); showLoader(false); }

        function startManualOrder() {
            const name = document.getElementById('m-cust-input').value; if(!name) return alert("ระบุชื่อลูกค้า");
            manualMode = { name: name, email: "manual-" + Date.now() + "@admin" };
            document.getElementById('manual-cust-display').innerText = name;
            document.getElementById('manual-mode-banner').classList.remove('hidden');
            switchView('buy');
        }
        function clearManualMode() { manualMode = null; document.getElementById('manual-mode-banner').classList.add('hidden'); switchView('manual-setup'); }

        function printOrder(id) {
            const o = allOrders.find(x => x[0] === id), items = JSON.parse(o[4]);
            const html = `
            <div style="width: 130mm; margin: auto; padding: 10mm; font-family: sans-serif; color: #000;">
                <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5mm; margin-bottom: 5mm;">
                    <div><h1 style="margin:0; font-size: 22px;">${settings.name}</h1><p style="font-size: 11px;">ใบเสร็จรับเงิน / Receipt</p></div>
                    <img src="${settings.logo}" style="width: 20mm; height: 20mm; object-fit: cover; border-radius: 4mm;">
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8mm;">
                    <div><p><b>ลูกค้า:</b> ${o[2]}</p></div>
                    <div style="text-align: right;"><p>เลขที่: ${o[0]}</p><p>วันที่: ${o[8].split('T')[0]}</p></div>
                </div>
                <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                    <thead><tr style="border-bottom: 1px solid #000; text-align: left;"><th style="padding: 2mm 0;">รายการ</th><th style="text-align: center;">จำนวน</th><th style="text-align: right;">รวม</th></tr></thead>
                    <tbody>${items.map(i => `<tr><td style="padding: 3mm 0;">${i.name}</td><td style="text-align: center;">${i.qty}</td><td style="text-align: right;">${(i.price*i.qty).toLocaleString()}</td></tr>`).join('')}</tbody>
                </table>
                <div style="margin-top: 10mm; text-align: right;"><p style="font-size: 22px; font-weight: bold;">รวมสุทธิ: ${o[5]} ฿</p></div>
            </div>`;
            const w = window.open('', '_blank');
            w.document.write(`<html><body onload="window.print();window.close()">${html}</body></html>`); w.document.close();
        }

        function resizeImage(file, callback) {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'), MAX = 450;
                    let w = img.width, h = img.height;
                    if(w > MAX) { h *= MAX/w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    callback(canvas.toDataURL('image/jpeg', 0.8));
                };
            };
        }
        function viewImage(u) { if(!u || u==='null') return alert("ไม่มีสลิป"); window.open(u); }
        function showLoader(v) { document.getElementById('loader').classList.toggle('hidden', !v); }

        init();
    </script>
</body>
</html>
