<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUI SHOP - Smart Grocery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .hidden { display: none; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">

    <!-- ส่วนโหลด (Loader) -->
    <div id="loader" class="fixed inset-0 bg-white/90 z-[9999] flex flex-col items-center justify-center hidden">
        <div class="loader w-12 h-12 border-4 border-slate-200 rounded-full mb-4"></div>
        <p class="text-blue-600 font-bold">กำลังดำเนินการ...</p>
    </div>

    <!-- 1. หน้าเข้าสู่ระบบ (Login) -->
    <div id="page-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <span class="text-3xl text-white">🏪</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">เข้าสู่ระบบร้านค้า</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="อีเมล (admin@test.com)" class="w-full p-4 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                <input type="password" id="login-pass" placeholder="รหัสผ่าน (1234)" class="w-full p-4 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition active:scale-95 shadow-lg shadow-blue-100">
                    ล็อกอิน
                </button>
            </div>
        </div>
    </div>

    <!-- 2. ส่วนเนื้อหาหลัก (Main App) -->
    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b sticky top-0 z-40">
            <div class="container mx-auto p-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img id="store-logo" src="" class="w-10 h-10 rounded-lg object-cover bg-slate-100 border">
                    <span id="store-name" class="font-bold text-xl text-slate-800">Grocery Store</span>
                </div>
                <button onclick="logout()" class="text-red-500 bg-red-50 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-100">ออก</button>
            </div>
        </header>

        <main class="container mx-auto p-4 flex-1">
            
            <!-- VIEW: เจ้าของร้าน (Admin) -->
            <div id="view-admin" class="hidden max-w-5xl mx-auto grid md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-xl mb-6 text-slate-800">📦 จัดการสินค้า</h3>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="p-name" placeholder="ชื่อสินค้า" class="flex-1 p-3 bg-slate-50 rounded-xl outline-none border focus:border-blue-400">
                        <input type="number" id="p-price" placeholder="ราคา" class="w-24 p-3 bg-slate-50 rounded-xl outline-none border focus:border-blue-400">
                        <button onclick="addProduct()" class="bg-blue-600 text-white px-6 rounded-xl font-bold hover:bg-blue-700">+</button>
                    </div>
                    <div id="stock-list" class="divide-y max-h-[50vh] overflow-y-auto"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-xl mb-6 text-slate-800">⚙️ ตั้งค่าร้าน</h3>
                    <div class="space-y-4">
                        <input type="text" id="s-name" placeholder="ชื่อร้าน" class="w-full p-3 bg-slate-50 rounded-xl border outline-none focus:border-blue-400">
                        <input type="text" id="s-logo" placeholder="URL รูปโลโก้" class="w-full p-3 bg-slate-50 rounded-xl border outline-none focus:border-blue-400">
                        <input type="text" id="s-pp" placeholder="เบอร์ PromptPay" class="w-full p-3 bg-slate-50 rounded-xl border outline-none focus:border-blue-400">
                        <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-black transition">บันทึกข้อมูล</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: ผู้ซื้อ (Buyer) -->
            <div id="view-buyer" class="hidden grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <h2 class="text-2xl font-bold mb-2">แสกนรายการสั่งของ 📝</h2>
                        <p class="text-blue-100 mb-6 font-light">ถ่ายรูปรายการที่เขียนใส่กระดาษเพื่อสั่งของ</p>
                        <div class="flex flex-wrap gap-3">
                            <input type="file" id="scan-input" accept="image/*" class="hidden">
                            <button onclick="document.getElementById('scan-input').click()" class="bg-white/20 hover:bg-white/30 px-6 py-3 rounded-xl font-semibold backdrop-blur-sm">เลือกรูป</button>
                            <button onclick="processOCR()" class="bg-white text-blue-600 px-8 py-3 rounded-xl font-bold shadow-lg">เริ่มแสกน</button>
                        </div>
                    </div>
                    <div id="ocr-results" class="grid gap-3"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 h-fit sticky top-24">
                    <h3 class="font-bold text-xl mb-6">ตะกร้า 🛒</h3>
                    <div id="cart-list" class="divide-y mb-6 max-h-[40vh] overflow-y-auto">
                        <p class="text-center text-slate-400 py-10">ยังไม่มีสินค้า</p>
                    </div>
                    <div class="flex justify-between text-3xl font-black mb-6">
                        <span>รวม:</span>
                        <span class="text-blue-600"><span id="cart-total">0</span> ฿</span>
                    </div>
                    <button onclick="checkout()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black text-xl hover:bg-green-600 shadow-lg shadow-green-100 transition-transform active:scale-95">จ่ายเงิน</button>
                    <div id="qr-area" class="mt-6 hidden text-center p-4 bg-slate-50 rounded-2xl border-2 border-dashed">
                        <img id="qr-code" src="" class="mx-auto rounded-lg shadow-md mb-2">
                        <p class="text-green-600 font-bold">แสกน QR จ่ายเงิน</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // URL ใหม่ที่คุณให้มา
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEjxkGdnpER7j7ziPN2RKHAZoSWoi0FJEJgUS6DfeHylRG2dIG9NG1AFFLXaOi_H5YzA/exec";
        
        let products = [];
        let cart = [];
        let settings = {};
        let user = JSON.parse(localStorage.getItem('user_data'));

        // --- ฟังชันเรียก API แบบปลอดภัย ---
        async function callAPI(action, data = {}) {
            toggleLoader(true);
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, ...data })
                });
                const text = await response.text();
                return JSON.parse(text); // แปลงเป็น JSON เองเพื่อเลี่ยง SyntaxError
            } catch (e) {
                console.error("API Error:", e);
                return { success: false };
            } finally {
                toggleLoader(false);
            }
        }

        // --- ระบบ Login ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            if(!email || !password) return alert("กรุณากรอกข้อมูล");

            const res = await callAPI('login', { email, password });
            if (res.success) {
                localStorage.setItem('user_data', JSON.stringify(res));
                user = res;
                init();
            } else {
                alert("อีเมลหรือรหัสผ่านผิด");
            }
        }

        function logout() {
            localStorage.removeItem('user_data');
            location.reload();
        }

        // --- เริ่มต้นโหลดข้อมูล ---
        async function init() {
            if (!user) return;
            document.getElementById('page-login').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');

            toggleLoader(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getInitialData`);
                const data = await res.json();
                
                products = data.products.map(p => ({ id: p[0], name: p[1], price: p[2] }));
                settings = { name: data.settings[0], logo: data.settings[1], pp: data.settings[2] };

                document.getElementById('store-name').innerText = settings.name;
                document.getElementById('store-logo').src = settings.logo || "https://via.placeholder.com/50";

                if (user.role === 'admin') {
                    document.getElementById('view-admin').classList.remove('hidden');
                    document.getElementById('s-name').value = settings.name;
                    document.getElementById('s-logo').value = settings.logo;
                    document.getElementById('s-pp').value = settings.pp;
                    renderStock();
                } else {
                    document.getElementById('view-buyer').classList.remove('hidden');
                }
            } catch (e) { console.error("Load Data Error", e); }
            toggleLoader(false);
        }

        // --- หน้าผู้ซื้อ (OCR & Cart) ---
        async function processOCR() {
            const file = document.getElementById('scan-input').files[0];
            if (!file) return alert("เลือกรูปก่อนครับ");

            toggleLoader(true);
            const res = await Tesseract.recognize(file, 'tha+eng');
            const lines = res.data.text.split('\n');
            const resultDiv = document.getElementById('ocr-results');
            resultDiv.innerHTML = "";

            lines.forEach(line => {
                if (line.trim().length < 2) return;
                const match = products.find(p => line.includes(p.name));
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm";
                
                if (match) {
                    div.innerHTML = `<span>✅ <b>${match.name}</b> (${match.price}฿)</span> 
                                     <button onclick="addToCart('${match.id}')" class="bg-blue-600 text-white px-4 py-1 rounded-xl font-bold">+</button>`;
                } else {
                    let opts = products.map(p => `<option value="${p.id}">${p.name} (${p.price}฿)</option>`).join('');
                    div.innerHTML = `<span class="text-slate-400 italic text-sm">❓ "${line.substring(0,10)}..."</span>
                                     <select onchange="addToCart(this.value)" class="text-xs border p-2 rounded-xl outline-none">
                                        <option>เลือกสินค้า...</option>${opts}
                                     </select>`;
                }
                resultDiv.appendChild(div);
            });
            toggleLoader(false);
        }

        function addToCart(id) {
            const p = products.find(i => i.id == id);
            if(p) { cart.push({...p, uid: Date.now()}); renderCart(); }
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            if(cart.length === 0) {
                list.innerHTML = `<p class="text-center text-slate-400 py-10">ยังไม่มีสินค้า</p>`;
                document.getElementById('cart-total').innerText = 0;
                return;
            }
            list.innerHTML = cart.map(item => {
                total += parseFloat(item.price);
                return `<div class="flex justify-between py-2 text-sm"><span>${item.name}</span><b>${item.price}฿</b></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function checkout() {
            const total = document.getElementById('cart-total').innerText.replace(/,/g, '');
            if(total == "0") return;
            document.getElementById('qr-code').src = `https://promptpay.io/${settings.pp}/${total}.png`;
            document.getElementById('qr-area').classList.remove('hidden');
        }

        // --- หน้าแอดมิน (Stock & Settings) ---
        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            if(!name || !price) return;
            await callAPI('addProduct', { name, price });
            location.reload();
        }

        async function saveSettings() {
            const name = document.getElementById('s-name').value;
            const logo = document.getElementById('s-logo').value;
            const pp = document.getElementById('s-pp').value;
            await callAPI('updateSettings', { name, logo, pp });
            location.reload();
        }

        function renderStock() {
            document.getElementById('stock-list').innerHTML = products.map(p => `
                <div class="flex justify-between py-3 items-center">
                    <span>${p.name} (<b>${p.price}฿</b>)</span>
                    <button onclick="deleteProduct('${p.id}')" class="text-red-500 font-bold">ลบ</button>
                </div>`).join('');
        }

        async function deleteProduct(id) {
            if(!confirm("ลบสินค้านี้?")) return;
            await callAPI('deleteProduct', { id });
            location.reload();
        }

        function toggleLoader(v) { document.getElementById('loader').classList.toggle('hidden', !v); }

        if (user) init();
    </script>
</body>
</html>
